 # yaml-language-server: $schema=https://unpkg.com/@sveltia/cms/schema/sveltia-cms.json

backend:
  name: github
  repo: Cool-Byte01/koncongopi
  branch: main
  commit_messages:
  create: "content: tambah {{collection}} '{{slug}}'"
  update: "content: perbarui {{collection}} '{{slug}}'"
  delete: "content: hapus {{collection}} '{{slug}}'"
  uploadMedia: "assets: unggah {{path}}"
  deleteMedia: "assets: hapus {{path}}"

media_folder: "static/images/uploads"
public_folder: "/images/uploads"

collections:
  - name: posts
    label: Posts
    label_singular: Post
    folder: /content/posts
    preview_path: "posts/{{slug}}"
    sortable_fields:
      fields: [date, title]
      default:
        field: date
        direction: descending
    fields:
      - { label: Title, name: title, widget: string }
      - { label: Date, name: date, widget: datetime, type: date }
      - { label: Description, name: description, widget: string, required: false }
      - { label: Draft, name: draft, widget: boolean, default: false }
      - { label: Categories, name: categories, widget: list, required: false }
      - { label: Series, name: series, widget: string, required: false }
      - { label: Series Order, name: series_order, widget: number, value_type: int, min: 1, required: false }
      - { label: Tags, name: tags, widget: list, required: false
      - { label: Cover Image, name: cover, widget: image, required: false }
      - { label: Body, name: body, widget: richtext }
